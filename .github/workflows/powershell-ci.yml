name: PowerShell CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse all PowerShell scripts
        shell: pwsh
        run: |
          $errors = @()
          Get-ChildItem -Recurse -Filter '*.ps1' | ForEach-Object {
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$parseErrors)
            if ($parseErrors) {
              $errors += "Parse error in $($_.FullName): $($parseErrors[0].Message)"
            }
          }
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }

      - name: Verify module manifest
        shell: pwsh
        run: |
          $manifestPath = './psd1/NvFailsafeRecovery.psd1'
          if (-not (Test-Path $manifestPath)) { throw "Missing manifest: $manifestPath" }
          $manifest = Import-PowerShellDataFile -Path $manifestPath
          if ([string]::IsNullOrWhiteSpace($manifest.ModuleVersion)) { throw 'ModuleVersion is required.' }
          $requiredVersion = [version]'5.1'
          $manifestVersion = [version]$manifest.PowerShellVersion
          if ($manifestVersion -lt $requiredVersion) { throw 'PowerShellVersion must be at least 5.1.' }
          Write-Host "Manifest version $($manifest.ModuleVersion) validated."

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser -SkipPublisherCheck

      - name: Run smoke test
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/Invoke-SmokeTest.ps1

      - name: Run Pester tests
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.0
          $result = Invoke-Pester -Path ./tests -PassThru
          if ($result.FailedCount -gt 0) {
            throw "Pester reported $($result.FailedCount) failed test(s)."
          }

      - name: Run PSScriptAnalyzer if available
        shell: pwsh
        continue-on-error: true
        run: |
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
            Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck
          }
          Import-Module PSScriptAnalyzer
          $results = Invoke-ScriptAnalyzer -Path ./src,./scripts -Severity Error -ExcludeRule PSAvoidUsingWriteHost
          if ($results) {
            $results | Format-Table -AutoSize
            throw 'PSScriptAnalyzer reported blocking errors.'
          }
          Write-Host 'PSScriptAnalyzer: no blocking errors.'
