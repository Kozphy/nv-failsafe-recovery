name: Legacy PowerShell CI

on:
  push:
    branches: [main, master]
    paths:
      - 'legacy/powershell/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'legacy/powershell/**'

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse legacy PowerShell scripts
        shell: pwsh
        run: |
          $errors = @()
          Get-ChildItem -Path ./legacy/powershell -Recurse -Filter '*.ps1' | ForEach-Object {
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$parseErrors)
            if ($parseErrors) {
              $errors += "Parse error in $($_.FullName): $($parseErrors[0].Message)"
            }
          }
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }

      - name: Verify legacy module manifest
        shell: pwsh
        run: |
          $manifestPath = './legacy/powershell/psd1/NvFailsafeRecovery.psd1'
          if (-not (Test-Path $manifestPath)) { throw "Missing manifest: $manifestPath" }
          $manifest = Import-PowerShellDataFile -Path $manifestPath
          if ([string]::IsNullOrWhiteSpace($manifest.ModuleVersion)) { throw 'ModuleVersion is required.' }
          . ./legacy/powershell/src/Utilities.ps1
          if (-not (Test-PowerShellVersionMeetsMinimum -Version $manifest.PowerShellVersion -MinimumVersion '5.1')) {
            throw 'PowerShellVersion must be at least 5.1.'
          }
          Write-Host "Legacy manifest version $($manifest.ModuleVersion) validated."

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser -SkipPublisherCheck

      - name: Run legacy smoke test
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File ./legacy/powershell/scripts/Invoke-SmokeTest.ps1

      - name: Run legacy Pester tests
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.0
          $result = Invoke-Pester -Path ./legacy/powershell/tests -PassThru
          if ($result.FailedCount -gt 0) {
            throw "Pester reported $($result.FailedCount) failed test(s)."
          }
