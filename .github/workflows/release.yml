name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve release version
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          if ($tag -notmatch '^v(.+)$') {
            throw "Tag '$tag' must look like v1.0.0"
          }
          $version = $Matches[1]
          Write-Output "Release version: $version"
          "NV_FAILSAFE_VERSION=$version" >> $env:GITHUB_ENV
          "NV_FAILSAFE_TAG=$tag" >> $env:GITHUB_ENV

      - name: Verify package version matches tag
        shell: pwsh
        run: |
          $pyproject = Get-Content -Raw -Path './pyproject.toml'
          if ($pyproject -notmatch 'version\s*=\s*"([^"]+)"') {
            throw 'Could not parse version from pyproject.toml'
          }
          $packageVersion = $Matches[1]
          if ($packageVersion -ne $env:NV_FAILSAFE_VERSION) {
            throw "pyproject.toml version '$packageVersion' does not match tag version '$($env:NV_FAILSAFE_VERSION)'."
          }
          Write-Output "Package version $packageVersion matches tag."

      - name: Install package and dev dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run smoke test
        shell: pwsh
        run: python scripts/invoke_smoke_test.py

      - name: Run pytest
        shell: pwsh
        run: pytest

      - name: Build release archive
        shell: pwsh
        run: |
          $staging = Join-Path $env:RUNNER_TEMP 'nv-failsafe-recovery'
          if (Test-Path $staging) {
            Remove-Item -LiteralPath $staging -Recurse -Force
          }
          New-Item -ItemType Directory -Path $staging | Out-Null

          $include = @(
            'nv_failsafe_recovery',
            'scripts',
            'docs',
            'examples',
            'legacy',
            'pyproject.toml',
            'README.md',
            'LICENSE',
            'CONTRIBUTING.md',
            'SECURITY.md'
          )

          foreach ($item in $include) {
            if (Test-Path -LiteralPath $item) {
              Copy-Item -LiteralPath $item -Destination (Join-Path $staging $item) -Recurse -Force
            }
          }

          $zipName = "nv-failsafe-recovery-v$($env:NV_FAILSAFE_VERSION).zip"
          $zipPath = Join-Path $env:RUNNER_TEMP $zipName
          if (Test-Path $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }
          Compress-Archive -Path (Join-Path $staging '*') -DestinationPath $zipPath -Force

          $hash = Get-FileHash -LiteralPath $zipPath -Algorithm SHA256
          $checksumPath = "$zipPath.sha256"
          "$($hash.Hash)  $zipName" | Set-Content -LiteralPath $checksumPath -Encoding ascii

          "NV_FAILSAFE_ZIP=$zipPath" >> $env:GITHUB_ENV
          "NV_FAILSAFE_ZIP_NAME=$zipName" >> $env:GITHUB_ENV
          "NV_FAILSAFE_CHECKSUM=$checksumPath" >> $env:GITHUB_ENV

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: NV-Failsafe Recovery ${{ env.NV_FAILSAFE_TAG }}
          generate_release_notes: true
          files: |
            ${{ env.NV_FAILSAFE_ZIP }}
            ${{ env.NV_FAILSAFE_CHECKSUM }}
          body: |
            ## Install

            1. Download `nv-failsafe-recovery-v${{ env.NV_FAILSAFE_VERSION }}.zip` below.
            2. Extract the archive.
            3. Install Python 3.11+ and dependencies:

            ```powershell
            pip install -e .
            ```

            4. Run:

            ```powershell
            python -m nv_failsafe_recovery --mode detect
            ```

            Verify the SHA256 checksum using the bundled `.sha256` file before running on production systems.

            ## Safety

            - Detect/Report/Doctor are read-only by default.
            - Fix mode requires `--apply`; adapter restart requires `--apply` and `--force`.
            - This release never uninstalls drivers or runs DDU.

            ## Migration

            PowerShell v1.1.0 sources are preserved under `legacy/powershell/`. See `docs/migration-powershell-to-python.md`.
