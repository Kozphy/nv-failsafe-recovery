name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          if ($tag -notmatch '^v(.+)$') {
            throw "Tag '$tag' must look like v1.0.0"
          }
          $version = $Matches[1]
          Write-Output "Release version: $version"
          "NV_FAILSAFE_VERSION=$version" >> $env:GITHUB_ENV
          "NV_FAILSAFE_TAG=$tag" >> $env:GITHUB_ENV

      - name: Verify module version matches tag
        shell: pwsh
        run: |
          $manifestPath = './psd1/NvFailsafeRecovery.psd1'
          $manifest = Import-PowerShellDataFile -Path $manifestPath
          if ($manifest.ModuleVersion -ne $env:NV_FAILSAFE_VERSION) {
            throw "ModuleVersion '$($manifest.ModuleVersion)' in $manifestPath does not match tag version '$($env:NV_FAILSAFE_VERSION)'."
          }
          if ([string]::IsNullOrWhiteSpace($manifest.PowerShellVersion)) { throw 'PowerShellVersion is required.' }
          . ./src/Utilities.ps1
          if (-not (Test-PowerShellVersionMeetsMinimum -Version $manifest.PowerShellVersion -MinimumVersion '5.1')) {
            throw 'PowerShellVersion must be at least 5.1.'
          }
          Write-Output "Module version $($manifest.ModuleVersion) matches tag."

      - name: Parse all PowerShell scripts
        shell: pwsh
        run: |
          $errors = @()
          Get-ChildItem -Recurse -Filter '*.ps1' | ForEach-Object {
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$parseErrors)
            if ($parseErrors) {
              $errors += "Parse error in $($_.FullName): $($parseErrors[0].Message)"
            }
          }
          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            exit 1
          }

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Pester -MinimumVersion 5.0 -Force -Scope CurrentUser -SkipPublisherCheck
          Import-Module Pester -MinimumVersion 5.0

      - name: Run smoke test
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File ./scripts/Invoke-SmokeTest.ps1

      - name: Run Pester tests
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.0
          $result = Invoke-Pester -Path ./tests -PassThru
          if ($result.FailedCount -gt 0) {
            throw "Pester reported $($result.FailedCount) failed test(s)."
          }

      - name: Build release archive
        shell: pwsh
        run: |
          $staging = Join-Path $env:RUNNER_TEMP 'nv-failsafe-recovery'
          if (Test-Path $staging) {
            Remove-Item -LiteralPath $staging -Recurse -Force
          }
          New-Item -ItemType Directory -Path $staging | Out-Null

          $include = @(
            'scripts',
            'src',
            'psd1',
            'docs',
            'examples',
            'README.md',
            'LICENSE',
            'CONTRIBUTING.md',
            'SECURITY.md'
          )

          foreach ($item in $include) {
            if (Test-Path -LiteralPath $item) {
              Copy-Item -LiteralPath $item -Destination (Join-Path $staging $item) -Recurse -Force
            }
          }

          $zipName = "nv-failsafe-recovery-v$($env:NV_FAILSAFE_VERSION).zip"
          $zipPath = Join-Path $env:RUNNER_TEMP $zipName
          if (Test-Path $zipPath) {
            Remove-Item -LiteralPath $zipPath -Force
          }
          Compress-Archive -Path (Join-Path $staging '*') -DestinationPath $zipPath -Force

          $hash = Get-FileHash -LiteralPath $zipPath -Algorithm SHA256
          $checksumPath = "$zipPath.sha256"
          "$($hash.Hash)  $zipName" | Set-Content -LiteralPath $checksumPath -Encoding ascii

          "NV_FAILSAFE_ZIP=$zipPath" >> $env:GITHUB_ENV
          "NV_FAILSAFE_ZIP_NAME=$zipName" >> $env:GITHUB_ENV
          "NV_FAILSAFE_CHECKSUM=$checksumPath" >> $env:GITHUB_ENV

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: NV-Failsafe Recovery ${{ env.NV_FAILSAFE_TAG }}
          generate_release_notes: true
          files: |
            ${{ env.NV_FAILSAFE_ZIP }}
            ${{ env.NV_FAILSAFE_CHECKSUM }}
          body: |
            ## Install

            1. Download `nv-failsafe-recovery-v${{ env.NV_FAILSAFE_VERSION }}.zip` below.
            2. Extract the archive.
            3. Run:

            ```powershell
            powershell -ExecutionPolicy Bypass -File .\scripts\NvFailsafeRecovery.ps1 -Mode Detect
            ```

            Verify the SHA256 checksum using the bundled `.sha256` file before running on production systems.

            ## Safety

            - Detect/Report/Doctor are read-only by default.
            - Fix mode requires `-Apply`; adapter restart requires `-Apply` and `-Force`.
            - This release never uninstalls drivers or runs DDU.
